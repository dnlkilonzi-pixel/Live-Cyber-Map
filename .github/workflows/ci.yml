name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio anyio httpx pytest-cov

      - name: Lint with ruff
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --ignore=tests/integration \
            --cov=app --cov-report=term-missing --cov-fail-under=70
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379"
          OLLAMA_URL: "http://localhost:11434"
          OLLAMA_MODEL: "llama3.2:3b"

  # ── Frontend: type-check + lint ──────────────────────────────────────────
  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint || true

  # ── Playwright smoke tests (requires running frontend) ──────────────────
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Branch A: test against an already-deployed preview URL ──────────
      - name: Run Playwright against preview deployment
        if: ${{ secrets.BASE_URL != '' }}
        run: npx playwright test --reporter=list
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      # ── Branch B: build + serve locally when no preview URL is set ──────
      - name: Build frontend (local mode)
        if: ${{ secrets.BASE_URL == '' }}
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000/ws"

      - name: Start frontend (background, local mode)
        if: ${{ secrets.BASE_URL == '' }}
        run: |
          npm run start &
          # Wait for the Next.js server to accept connections
          for i in {1..20}; do
            if curl -sf http://localhost:3000 -o /dev/null; then
              echo "Frontend ready"
              break
            fi
            echo "Waiting for frontend ($i/20)…"
            sleep 3
          done
        env:
          PORT: 3000

      - name: Run Playwright tests (local mode)
        if: ${{ secrets.BASE_URL == '' }}
        run: npx playwright test --reporter=list
        env:
          BASE_URL: "http://localhost:3000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Docker smoke test ────────────────────────────────────────────────────
  docker-smoke:
    name: Docker smoke test (/api/health)
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cyber-backend ./backend

      - name: Start backend + dependencies
        run: |
          docker compose up -d db redis backend
          sleep 20
        env:
          COMPOSE_PROJECT_NAME: ci

      - name: Health check
        run: |
          for i in {1..10}; do
            status=$(curl -sf http://localhost:8000/api/health -o /dev/null -w "%{http_code}" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Health check passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $status, retrying..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          docker compose logs backend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Publish backend Docker image to GHCR (main branch only) ────────────
  publish-ghcr:
    name: Publish backend image to GHCR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, docker-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Tauri desktop build (main branch only) ──────────────────────────────
  tauri-build:
    name: Tauri Desktop Build
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os_name: linux
          - platform: windows-latest
            os_name: windows
          - platform: macos-latest
            os_name: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000/ws"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: .
          args: --config '{"build":{"beforeBuildCommand":"","frontendDist":"../frontend/.next"}}'

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os_name }}
          path: src-tauri/target/release/bundle/**/*
          retention-days: 30
